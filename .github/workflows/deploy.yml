name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Hexo
        run: |
          npm install -g hexo-cli
          npm install
          
      - name: Deploy
        run: |
          hexo clean
          hexo deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
