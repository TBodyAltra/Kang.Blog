name: Deploy

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Hexo
        run: |
          npm install -g hexo-cli
          npm install
          
      - name: Build
        run: |
          hexo clean
          hexo generate
          
      - name: Deploy
        run: |
          git config --global user.name "Kang Xu"
          git config --global user.email "kang.xu92@outlook.com"
          hexo deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
