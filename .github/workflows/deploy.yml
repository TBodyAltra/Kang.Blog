name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Configure Git
        run: |
          git config --global user.name "Kang Xu"
          git config --global user.email "kang.xu92@outlook.com"
          
      - name: Install Hexo
        run: |
          npm install -g hexo-cli
          npm install
          
      - name: Deploy to GitHub Pages
        run: |
          hexo clean
          hexo deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
