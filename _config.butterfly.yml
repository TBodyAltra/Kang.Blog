# Theme overrides for Butterfly.
# This file is read by the Butterfly theme and survives theme re-clones in CI.

math:
  # Enable MathJax so hexo-math output is rendered.
  use: mathjax
  per_page: true
  hide_scrollbar: false

  mathjax:
    enableMenu: true
    tags: none

# Author avatar + follow link overrides
avatar:
  img: https://github.com/TBodyAltra.png
  effect: false

aside:
  card_author:
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/TBodyAltra
